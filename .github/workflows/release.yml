name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build binary (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
          - target: darwin-x64
            runner: macos-latest
          - target: linux-arm64
            runner: ubuntu-latest
          - target: linux-x64
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build binary
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          bun build --compile --target=bun-${{ matrix.target }} \
            --define "VEYE_VERSION=\"${VERSION}\"" \
            packages/cli/src/cli.ts \
            --outfile veye-${{ matrix.target }}
      - name: Verify binary
        run: |
          chmod +x veye-${{ matrix.target }}
          ./veye-${{ matrix.target }} --version
          ./veye-${{ matrix.target }} --help
      - name: Compress binary
        run: |
          if [[ "${{ matrix.target }}" == darwin-* ]]; then
            tar -czf veye-${{ matrix.target }}.tar.gz veye-${{ matrix.target }}
          else
            tar -czf veye-${{ matrix.target }}.tar.gz veye-${{ matrix.target }}
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: veye-${{ matrix.target }}
          path: veye-${{ matrix.target }}.tar.gz
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true
      - name: List downloaded assets
        run: ls -la assets/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            assets/*.tar.gz
